<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>емемем</title>
<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background:#fff0f5;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#333;
}

h1 { margin-bottom:20px; color:#ff4b7d; }

#menu, #game {
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

button {
  padding:16px 28px;
  margin:12px;
  border:none;
  border-radius:18px;
  font-size:18px;
  font-weight:700;
  background:#ff4b7d;
  color:white;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

#game button {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  max-width:320px;
}

button:active { transform:scale(0.95); }

.card-container {
  perspective:1000px;
  width:90%;
  height:60vh;
}

.card {
  width:100%;
  height:100%;
  background:white;
  border-radius:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:25px;
  font-size:24px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

@keyframes flipAnim {
  0% { transform: rotateY(0); }
  50% { transform: rotateY(90deg); }
  100% { transform: rotateY(0); }
}

.flip {
  animation: flipAnim 0.5s;
}

</style>
</head>
<body>

<h1>емемем</h1>

<div id="menu">
  <button onclick="startMode('questions')">питання </button>
  <button onclick="startMode('actions')">дії </button>
</div>

<div id="game" style="display:none">
  <div class="card-container">
    <div id="card" class="card"></div>
  </div>
  <button onclick="next()">далі</button>
</div>

<script>

const questions = [
"Що ти зараз до мене відчуваєш?",
"Коли ти найсильніше відчуваєш любов до мене?",
"Що тебе робить щасливою зі мною?",
"Чи боїшся ти втратити мене?",
"Що тебе найбільше тішить у наших стосунках?",
"Що тебе змушує сумувати за мною?",
"Коли ти почуваєшся найближче до мене?",
"Що тебе заспокоює в мені?",
"Що ти хочеш відчувати частіше?",
"Що для тебе глибока любов?"
];

const actions = [
"Поцілуй в ніс",
"Поцілуй в губи",
"Обійми одна одну 20 секунд ",
"Скажи 3 компліменти",
"Подивіться в очі 30 секунд",
"Погладь по волоссю",
"Скажи щось ніжне",
"Тримайтесь за руки",
"Зроби міні-масаж",
"Поцілуй в щоку",
"Скажи 'ти моя' ",
"Обійми ззаду",
"Погладь щоку",
"Поцілуй в лоб",
"Обійми мовчки"
];

let mode;
let qIndex = 0;
let shuffled = [];

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function startMode(m){
  mode = m;
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='flex';

  if(mode==='questions'){
    shuffled = shuffle([...questions]);
    qIndex = 0;
  }

  show();
}

function show(){
  const card = document.getElementById('card');

  if(mode==='questions'){
    card.innerText = shuffled[qIndex];
  } else {
    card.innerText = actions[Math.floor(Math.random()*actions.length)];
  }
}

function next(){
  const card = document.getElementById('card');
  card.classList.add('flip');

  setTimeout(()=>{
    if(mode==='questions'){
      qIndex = (qIndex + 1) % shuffled.length;
    }
    show();
  },250);

  setTimeout(()=>{
    card.classList.remove('flip');
  },500);
}

</script>
</body>
</html>
