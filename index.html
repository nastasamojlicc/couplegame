  height:100%;

.card-face {

  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  font-size:20px;

.controls {

let mode;
let index = 0;
let deck = [];

function vibrate(){
  if(navigator.vibrate) navigator.vibrate(30);
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function startMode(m){
  vibrate();
  mode = m;
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='flex';

  if(mode === 'questions'){
    deck = shuffle([...questions]);
  } else {
    deck = shuffle([...activities]);
  }

  index = 0;
  showCard();
}

function showCard(){
  document.getElementById('front').innerText = deck[index];
}

function next(){
  vibrate();
  const card = document.getElementById('card');

  card.classList.add('flip');

  setTimeout(()=>{
    index++;

    if(index >= deck.length){
      // перемішуємо знову коли закінчилось
      deck = shuffle(deck);
      index = 0;
    }

    showCard();
  },350);

  setTimeout(()=>{
    card.classList.remove('flip');
  },700);
}

function goBack(){
  vibrate();
  document.getElementById('game').style.display='none';
  document.getElementById('menu').style.display='flex';
}

window.onload = () => {
  document.getElementById('front').innerText = "Обери режим 💭 або 💋";
