 <!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<title>емемемем</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Montserrat", sans-serif;
  background: url("_ (9).jpeg") center/cover no-repeat;
  overflow: hidden;
}

/* 🌑 overlay */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
}

/* 📱 card */
.card {
  width: 380px;
  padding: 26px;
  border-radius: 22px;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(20px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  text-align: center;
  z-index: 2;
}

/* 💎 buttons */
.btn {
  border: none;
  border-radius: 16px;
  padding: 14px 22px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin: 10px;
  transition: 0.2s;
}

.yes {
  background: linear-gradient(135deg, #00c853, #69f0ae);
  color: white;
}

.no {
  background: linear-gradient(135deg, #ff1744, #ff8a80);
  color: white;
  position: absolute;
}

/* 💌 envelope */
.envelope {
  width: 170px;
  height: 110px;
  margin: 22px auto;
  background: linear-gradient(145deg, #fff, #f3f4f6);
  border-radius: 14px;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  box-shadow: 0 20px 45px rgba(0,0,0,0.15);
}

.envelope::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 60%;
  background: linear-gradient(135deg, #fbcfe8, #f9a8d4);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
}

.envelope.opening::before {
  opacity: 0;
}

/* 💌 letter */
.letter {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: 0.7s ease;
}

.letter.open {
  max-height: 500px;
  opacity: 1;
}

/* 💖 hearts */
.heart {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 99999;

  animation: floatUp linear forwards;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-900px) scale(1.6);
    opacity: 0;
  }
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-800px) scale(1.6); opacity: 0; }
}

/* 📺 FINAL NETFLIX SCREEN */
.final-screen {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(0,0,0,0.9), black);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 99999;
  animation: fadeIn 1s ease;
  text-align: center;
}

.final-screen h1 {
  font-size: 40px;
  margin: 0;
  animation: pop 0.6s ease;
}

.final-screen p {
  opacity: 0.8;
}

/* 🗓 date block */
.date-block {
  margin-top: 20px;
  padding: 16px 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  font-size: 18px;
  animation: pop 0.8s ease;
}

.hidden { display: none; }

@keyframes fadeIn {
  from { opacity: 0; transform: scale(1.1); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="card" id="card">
  <h2>привіт 🙂</h2>
  <button class="btn yes" onclick="next()">привіт</button>
</div>

<div id="finalScreen" class="final-screen hidden">
  <h1>ти сказала ТАК 💖</h1>
  <p>я шарила</p>

  <div class="date-block">
    🗓 22.04<br>
    ⏰ 17:00
  </div>
</div>

<script>

let step = 0;
let noCount = 0;

const noTexts = ["ні","ем","я тікаю","не","ну ні","😭","окей ні","ще ні","ладно","..."];

function next() {
  step++;
  if (step === 1) setCard("чуєш", "та");
  else if (step === 2) setCard("я подумала", "і?");
  else showInvite();
}

function setCard(t,b){
  document.getElementById("card").innerHTML = `
    <h2>${t}</h2>
    <button class="btn yes" onclick="next()">${b}</button>
  `;
}

function showInvite(){
  document.getElementById("card").innerHTML = `
    <h2>ідем на побачення?</h2>
    <button class="btn yes" id="yesBtn" onclick="yes()">так</button>
    <button class="btn no" id="noBtn" onclick="moveNo()">ні</button>
  `;
}

/* ❌ NO */
function moveNo(){
  noCount++;

  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");

  noBtn.style.transform = `translate(${Math.random()*300-150}px, ${Math.random()*300-150}px)`;
  noBtn.style.fontSize = Math.max(6, 12 - noCount) + "px";
  noBtn.innerText = noTexts[noCount] || "😭";

  yesBtn.style.transform = `scale(${1 + noCount * 0.2})`;
}

/* 💖 YES */
function yes(){
  hearts();

  document.getElementById("card").innerHTML = `
    <h2>перемога 💖</h2>

    <div class="envelope" id="env" onclick="openLetter()"></div>

    <div class="letter" id="letter">
      💌 запрошення<br><br>
      🗓 22.04<br>
      ⏰ 17:00
    </div>
  `;

  setTimeout(() => {
    document.getElementById("finalScreen").classList.remove("hidden");
    hearts();
  }, 900);
}

/* 💌 open */
function openLetter(){
  document.getElementById("env").classList.add("opening");
  setTimeout(() => {
    document.getElementById("letter").classList.add("open");
  }, 400);
}

/* 💖 hearts */
function hearts() {
  const emojis = ["💖","💘","💗","💓","💕","❤️"];

  for (let i = 0; i < 120; i++) {
    const h = document.createElement("div");

    h.className = "heart";
    h.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    h.style.left = Math.random() * 100 + "vw";
    h.style.top = Math.random() * 100 + "vh";

    h.style.fontSize = (10 + Math.random() * 40) + "px";
    h.style.animationDuration = (1 + Math.random() * 2.5) + "s";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 4000);
  }
}

</script>

</body>
</html>
